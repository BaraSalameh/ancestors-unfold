services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ancestors_unfold}
      POSTGRES_USER: ${POSTGRES_USER:-ancestors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - ancestors_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ancestors} -d ${POSTGRES_DB:-ancestors_unfold}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ancestors_postgres:
